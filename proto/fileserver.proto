syntax = "proto3";

package fileserver;

service FileServer {
  rpc FetchFile(FetchRequest) returns (stream FileChunk);
  rpc UploadFile(stream FileChunk) returns (UploadResponse);
  rpc RequestVote (VoteRequest) returns (VoteResponse);
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  rpc ReplicateFile (stream ReplicateFileRequest) returns 
(ReplicateFileResponse);
}

message FetchRequest {
    string filename = 1;
}

// First chunk has metadata, rest have chunk_data
message FileChunk {
    oneof data {
        FileMetadata metadata = 1;
        bytes chunk_data = 2;
    }
}

message FileMetadata {
    string filename = 1;
    int64 file_size = 2;
    string checksum = 3;
    int64 version = 4;
}

message UploadResponse {
    bool success = 1;
    string error_message = 2;
    string new_primary_fileserver = 3;
}

message VoteRequest {
  int64 term = 1;
  string candidate_id = 2;
  int64 last_log_index = 3;
  int64 last_log_term = 4;
}

message VoteResponse {
  int64 term = 1;
  bool vote_granted = 2;
}

message HeartbeatRequest {
  int64 term = 1;
  string leader_id = 2;
}

message HeartbeatResponse {
  int64 term = 1;
  bool success = 2;
}


message ReplicateFileRequest {
  oneof payload {
    FileMetadata metadata = 1;
    bytes file_data = 2;
  }
}

message ReplicateFileResponse {
  string error = 1;
}